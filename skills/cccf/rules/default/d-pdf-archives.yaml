rules:
  # --- R17 : PDF, accès aléatoire sur disque, jamais en heap ---

  - id: r17-pddocument-load-api-obsolete
    languages: [java]
    severity: ERROR
    message: >
      R17 — PDDocument.load(...) (API PDFBox historique) matérialise le PDF
      en mémoire. Utiliser PDFBox 3.x : Loader.loadPDF(new
      RandomAccessReadBufferedFile(fichierTemporaire)) après un spool sur
      disque local, jamais un byte[] ni un InputStream complet.
    metadata:
      regle: R17
      reference: design-rules.md#r17
    pattern: org.apache.pdfbox.pdmodel.PDDocument.load(...)

  - id: r17-loadpdf-sans-randomaccessread-fichier
    languages: [java]
    severity: ERROR
    message: >
      R17 — Loader.loadPDF appelé sans RandomAccessReadBufferedFile (accès
      disque). Un PDF n'est pas streamable (xref en fin de fichier) : spooler
      d'abord vers un fichier temporaire, puis charger via
      RandomAccessReadBufferedFile.
    metadata:
      regle: R17
      reference: design-rules.md#r17
    patterns:
      - pattern: org.apache.pdfbox.Loader.loadPDF($ARG, ...)
      - pattern-not: org.apache.pdfbox.Loader.loadPDF(new RandomAccessReadBufferedFile(...), ...)
      - pattern-not: org.apache.pdfbox.Loader.loadPDF(new RandomAccessReadBuffer(...), ...)

  - id: r17-pdfbox-cache-memoire-par-defaut
    languages: [java]
    severity: WARNING
    message: >
      R17 — chargement PDFBox sans cache de streams sur disque
      (IOUtils.createTempFileOnlyStreamCache()). Le cache mémoire par défaut
      est inacceptable sur un fichier non borné : configurer explicitement un
      cache sur disque.
    metadata:
      regle: R17
      reference: design-rules.md#r17
    patterns:
      - pattern: org.apache.pdfbox.Loader.loadPDF($RAR)
      - pattern-not: org.apache.pdfbox.Loader.loadPDF($RAR, $SCP)

  - id: r17-cache-pdfbox-en-memoire-explicite
    languages: [java]
    severity: ERROR
    message: >
      R17 — cache de streams PDFBox explicitement configuré en mémoire
      (MemoryUsageSetting.setupMainMemoryOnly /
      IOUtils.createMemoryOnlyStreamCache). Sur des PDF non bornés, le
      cache doit être sur disque : IOUtils.createTempFileOnlyStreamCache()
      (PDFBox 3.x) ou MemoryUsageSetting.setupTempFileOnly() (2.x).
    metadata:
      regle: R17
      reference: design-rules.md#r17
    pattern-either:
      - pattern: MemoryUsageSetting.setupMainMemoryOnly(...)
      - pattern: MemoryUsageSetting.setupMixed(...)
      - pattern: IOUtils.createMemoryOnlyStreamCache()

  - id: r17-randomaccessreadbuffer-en-memoire
    languages: [java]
    severity: WARNING
    message: >
      R17 — RandomAccessReadBuffer est un accès aléatoire adossé à la
      mémoire (byte[]/InputStream copié en heap). Acceptable uniquement sur
      un contenu borné et déjà contrôlé ; pour un PDF entrant non borné,
      spooler sur disque puis utiliser RandomAccessReadBufferedFile.
    metadata:
      regle: R17
      reference: design-rules.md#r17
    pattern-either:
      - pattern: new RandomAccessReadBuffer(...)
      - pattern: new org.apache.pdfbox.io.RandomAccessReadBuffer(...)

  # --- R18 : décompression défensive, en streaming ---
  # tar.gz (Apache Commons Compress : TarArchiveInputStream +
  # GzipCompressorInputStream) est le format de référence pour ce type de
  # flux ; les mêmes bornes s'appliquent à ZIP s'il doit être accepté. Les
  # patterns restent génériques sur le nom de variable/entrée ($TIS/$ENTRY) :
  # ils couvrent la forme de code quel que soit le type déclaré
  # (TarArchiveInputStream, ZipInputStream...).

  - id: r18-slip-chemin-non-verifie
    languages: [java]
    severity: ERROR
    message: >
      R18 — Zip Slip (nom de la vulnérabilité d'origine, mais le risque est
      générique à tout format d'archive, tar.gz inclus) : le nom d'une entrée
      d'archive est utilisé tel quel comme chemin d'écriture. Une entrée peut
      contenir ".." ou un chemin absolu et écrire hors du répertoire cible.
      Ne jamais utiliser le nom d'entrée comme chemin d'écriture : générer
      une clé/un nom côté plateforme, ou à défaut valider strictement le
      chemin résolu.
    metadata:
      regle: R18
      reference: design-rules.md#r18
      cwe: CWE-22
    pattern-either:
      - pattern: new File($DIR, $ENTRY.getName())
      - pattern: new File($DIR, $ENTRY.getName(...))
      - pattern: java.nio.file.Paths.get($DIR, $ENTRY.getName())
      - pattern: $DIRPATH.resolve($ENTRY.getName())

  - id: r18-lecture-archive-sans-compteur-octets
    languages: [java]
    severity: WARNING
    message: >
      R18 — lecture d'une entrée d'archive (`TarArchiveInputStream` ou
      équivalent) sans borne visible (compteur d'octets décompressés). Ne
      jamais faire confiance à la taille déclarée dans l'en-tête tar :
      compter les octets réellement décompressés au fil de l'eau et couper
      au dépassement (protection "bombe d'archive", ratio de compression
      max, nombre d'entrées max).
    metadata:
      regle: R18
      reference: design-rules.md#r18
    patterns:
      - pattern-inside: |
          while (($ENTRY = $TIS.getNextEntry()) != null) {
            ...
          }
      - pattern: |
          while (($N = $TIS.read(...)) != -1) {
            ...
          }
      - pattern-not: |
          while (($N = $TIS.read(...)) != -1) {
            $TOTAL += $N;
            ...
          }

  - id: r18-format-zip-inattendu
    languages: [java]
    severity: INFO
    message: >
      R18 — manipulation d'archive ZIP détectée. Le format de référence pour
      ce type de flux est tar.gz (GzipCompressorInputStream +
      TarArchiveInputStream), pas ZIP, sauf si une interface externe impose
      explicitement ZIP. Si ce code doit accepter du ZIP, les mêmes bornes
      s'appliquent (octets décompressés comptés, ratio max, entrées max,
      pas d'archive imbriquée) + spécificité ZIP : le flux DEFLATE d'une
      entrée peut dépasser la taille déclarée dans l'en-tête.
    metadata:
      regle: R18
      reference: design-rules.md#r18
    pattern-either:
      - pattern: new ZipInputStream(...)
      - pattern: new ZipFile(...)
      - pattern: new ZipArchiveInputStream(...)
      - pattern: new java.util.zip.ZipInputStream(...)
      - pattern: new java.util.zip.ZipFile(...)

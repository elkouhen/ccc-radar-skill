rules:
  - id: cccf.liveness.requests-no-timeout
    languages: [python]
    severity: WARNING
    message: >-
      Appel requests sans timeout : si le service distant ne répond jamais,
      ce thread reste bloqué indéfiniment.
    metadata:
      cwe: CWE-400
      category: liveness
    patterns:
      - pattern-either:
          - pattern: requests.get(...)
          - pattern: requests.post(...)
          - pattern: requests.put(...)
          - pattern: requests.delete(...)
          - pattern: requests.patch(...)
          - pattern: requests.request(...)
      - pattern-not: requests.get(..., timeout=$T, ...)
      - pattern-not: requests.post(..., timeout=$T, ...)
      - pattern-not: requests.put(..., timeout=$T, ...)
      - pattern-not: requests.delete(..., timeout=$T, ...)
      - pattern-not: requests.patch(..., timeout=$T, ...)
      - pattern-not: requests.request(..., timeout=$T, ...)

  - id: cccf.liveness.thread-join-no-timeout
    languages: [python]
    severity: WARNING
    message: >-
      Thread.join() sans timeout : attente potentiellement infinie si le
      thread ne se termine jamais.
    metadata:
      cwe: CWE-400
      category: liveness
    patterns:
      - pattern: $T.join()

  - id: cccf.liveness.future-result-no-timeout
    languages: [python]
    severity: WARNING
    message: >-
      Future.result() sans timeout : attente potentiellement infinie.
    metadata:
      cwe: CWE-400
      category: liveness
    patterns:
      - pattern: $F.result()

  - id: cccf.liveness.http-call-in-kafka-python-consumer-loop
    languages: [python]
    severity: ERROR
    message: >-
      Appel HTTP synchrone dans une boucle de consommation Kafka
      (kafka-python) : le temps d'attente peut dépasser
      max.poll.interval.ms et déclencher un rebalance.
    metadata:
      category: liveness
    patterns:
      - pattern-inside: |
          $CONSUMER = KafkaConsumer(...)
          ...
          for $MSG in $CONSUMER:
              ...
      - pattern-either:
          - pattern: requests.$METHOD(...)
          - pattern: httpx.$METHOD(...)

  - id: cccf.liveness.network-call-inside-lock
    languages: [python]
    severity: ERROR
    message: >-
      Appel réseau à l'intérieur d'un verrou : si l'appel bloque, le verrou
      reste tenu et tout autre thread qui l'attend se fige.
    metadata:
      category: liveness
    patterns:
      - pattern-inside: |
          with $LOCK:
              ...
      - pattern-either:
          - pattern: requests.$METHOD(...)
          - pattern: httpx.$METHOD(...)
